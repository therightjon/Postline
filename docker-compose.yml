# EXPERIMENTAL local stack for Postline.
#
# The supported local-dev path is ./dev.sh (Functions Core Tools + Vite); this
# compose file is a convenience for container-first users and has known rough
# edges:
#   - The Cosmos emulator (vnext-preview) can be flaky, especially on ARM Macs.
#   - The emulator uses a self-signed cert, so the API container sets
#     NODE_TLS_REJECT_UNAUTHORIZED=0 — NEVER do this outside local dev.
#   - Azurite serves blobs over plain HTTP, but media URLs are enforced
#     HTTPS-only by design — media upload works, but publishing media to
#     platforms requires a real storage account. Text posts work fully.
#
# Usage:
#   docker compose up --build
#   open http://localhost:5173  → "Enter Dev Mode" (or set ADMIN_PASSWORD_HASH)

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - '10000:10000'

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    environment:
      PROTOCOL: https
    ports:
      - '8081:8081'

  api:
    build: ./api
    depends_on:
      - azurite
      - cosmos
    environment:
      NODE_ENV: development
      ALLOW_DEV_AUTH: 'true'
      # Self-signed emulator cert — local dev only.
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
      AzureWebJobsStorage: 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;'
      COSMOS_ENDPOINT: 'https://cosmos:8081/'
      # Well-known Cosmos emulator key (public, not a secret).
      COSMOS_KEY: 'C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=='
      COSMOS_DATABASE: postline
      COSMOS_AUTO_INIT: 'true'
      BLOB_CONNECTION_STRING: 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;'
      BLOB_CONTAINER: media
      APP_BASE_URL: 'http://localhost:5173'
      API_BASE_URL: 'http://localhost:7071'
    ports:
      - '7071:80'

  client:
    image: node:20
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host"
    depends_on:
      - api
    environment:
      VITE_PROXY_TARGET: 'http://api:80'
    volumes:
      - ./client:/app
    ports:
      - '5173:5173'
