# Code-only deploy: publishes the API to the Function App and the client to
# the Static Web App. Run after the infrastructure exists (Deploy-to-Azure
# button or scripts/azure/provision.sh + configure.sh).
#
# Required repository secrets:
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE  — Function App > Get publish profile
#   AZURE_STATIC_WEB_APPS_API_TOKEN    — Static Web App > Manage deployment token
# Required repository variables:
#   FUNC_APP_NAME  — e.g. postline-api-abc123
#   FUNC_HOST      — e.g. postline-api-abc123.azurewebsites.net

name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies (production)
        run: npm ci --omit=dev
        working-directory: api

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNC_APP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client
        env:
          VITE_API_BASE_URL: https://${{ vars.FUNC_HOST }}/api

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: client/dist
          skip_app_build: true
          config_file_location: /
